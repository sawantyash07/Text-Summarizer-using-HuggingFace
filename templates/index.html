<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer | Red Noir SaaS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #e11d48;
            --primary-red-hover: #be123c;
            --bg-dark: #0a0a0c;
            --glass-bg: rgba(17, 17, 19, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --red-glow: 0 0 20px rgba(225, 29, 72, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Animated Background Particles */
        .bg-particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(225, 29, 72, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(225, 29, 72, 0.03) 0%, transparent 40%);
            pointer-events: none;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            [mask-image:radial-gradient(ellipse_at_center,black_40%,transparent_90%)];
            opacity: 0.5;
            pointer-events: none;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 5px var(--primary-red)); }
            50% { filter: drop-shadow(0 0 15px var(--primary-red)); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .animate-fade-in { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .shake-element { animation: shake 0.4s ease-in-out; border-color: var(--primary-red) !important; }

        /* Glassmorphism Classes */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: border 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover { border-color: rgba(225, 29, 72, 0.2); box-shadow: var(--red-glow); }

        /* Custom UI Elements */
        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, #aaa 50%, rgba(225, 29, 72, 0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .summarize-btn {
            background: linear-gradient(135deg, var(--primary-red), var(--primary-red-hover));
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .summarize-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(225, 29, 72, 0.5);
        }

        .summarize-btn:active { transform: scale(0.98); }

        .loader-spin {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Textarea Polish */
        textarea { scrollbar-width: thin; scrollbar-color: rgba(255, 255, 255, 0.1) transparent; }
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        /* Tooltip */
        .tooltip { position: relative; }
        .tooltip:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1e;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            letter-spacing: 0.5px;
            border: 1px solid var(--glass-border);
            z-index: 50;
            opacity: 0;
            animation: fadeInSimple 0.2s forwards;
        }
        @keyframes fadeInSimple { to { opacity: 1; } }

        /* Toast notifications */
        #toast-root {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast-item { animation: slideInLeft 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInLeft { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    </style>
</head>
<body class="selection:bg-rose-500/30">
    <div class="bg-particles"></div>
    <div class="bg-grid"></div>

    <div id="toast-root"></div>

    <main class="relative z-10 flex-1 flex flex-col items-center justify-center p-6 md:p-12 animate-fade-in">
        
        <!-- Header Section -->
        <header class="text-center mb-12">
            <div class="inline-flex items-center justify-center p-4 rounded-3xl bg-gradient-to-br from-white/5 to-white/10 border border-white/5 mb-6 opacity-0 animate-[fadeInUp_0.8s_ease_0.2s_forwards]">
                <iconify-icon icon="lucide:sparkles" class="text-3xl text-rose-500" style="animation: glowPulse 2s infinite ease-in-out;"></iconify-icon>
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter gradient-text transition-all mb-3 text-white">
                AI Text Summarizer
            </h1>
            <p class="text-zinc-500 text-sm md:text-base font-medium tracking-wide">
                Fine-tuned T5 model for <span class="text-rose-400">SAMSum conversations</span>
            </p>
        </header>

        <!-- Main Content Card -->
        <div class="w-full max-w-4xl relative">
            <div id="main-card" class="glass-card p-6 md:p-10">
                
                <!-- Input Block -->
                <div class="mb-8 relative" id="input-container">
                    <div class="flex items-center justify-between mb-3">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-zinc-500 flex items-center gap-2">
                            <iconify-icon icon="lucide:text-align-left" class="text-rose-500"></iconify-icon>
                            Source Text
                        </label>
                        <button id="clear-btn" class="text-zinc-600 hover:text-rose-500 transition-colors flex items-center gap-1 text-[10px] font-bold uppercase tracking-wider group">
                            <iconify-icon icon="lucide:trash-2" class="text-xs group-hover:rotate-12 transition-transform"></iconify-icon>
                            Clear
                        </button>
                    </div>
                    
                    <div class="relative group">
                        <textarea id="text-input" 
                            class="w-full min-h-[250px] bg-black/40 border border-white/5 rounded-2xl p-6 text-zinc-200 placeholder-zinc-700 focus:outline-none focus:border-rose-500/30 transition-all resize-y text-md leading-relaxed"
                            placeholder="Paste your conversation or text here..."></textarea>
                    </div>

                    <!-- Live Stats -->
                    <div class="flex items-center gap-4 mt-3 text-[10px] font-bold uppercase tracking-widest text-zinc-600">
                        <span id="char-count">0 characters</span>
                        <span class="opacity-30">|</span>
                        <span id="word-count">0 words</span>
                    </div>
                </div>

                <!-- Action Button -->
                <div class="tooltip" data-tip="Process your content through AI">
                    <button id="summarize-btn" class="summarize-btn w-full py-5 rounded-2xl flex items-center justify-center gap-3 shadow-xl">
                        <div id="btn-idle" class="flex items-center gap-3 font-extrabold uppercase tracking-widest text-xs text-white">
                            <iconify-icon icon="lucide:sparkles" class="text-xl"></iconify-icon>
                            Summarize Now
                        </div>
                        <div id="btn-loading" class="hidden flex items-center gap-3 font-extrabold uppercase tracking-widest text-xs text-white">
                            <div class="loader-spin"></div>
                            Summarizing...
                        </div>
                    </button>
                </div>

                <!-- Output Section -->
                <div id="result-section" class="hidden mt-12 pt-12 border-t border-white/5 opacity-0 transition-opacity duration-700">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <iconify-icon icon="lucide:bot" class="text-rose-500 text-2xl"></iconify-icon>
                            <h3 class="text-lg font-bold font-inter tracking-tight text-zinc-200 uppercase text-sm">🤖 AI Intelligence Summary</h3>
                        </div>
                        <div id="reduction-stat" class="hidden px-4 py-1.5 rounded-full bg-rose-500/10 border border-rose-500/20 text-[10px] font-bold uppercase tracking-widest text-rose-400">
                            Reduced from 120 words → 28 words
                        </div>
                    </div>

                    <div class="relative">
                        <div id="summary-content" class="bg-white/5 border border-white/5 p-8 rounded-2xl text-zinc-300 leading-relaxed font-inter text-md shadow-inner italic">
                            <!-- Injected Summary -->
                        </div>
                        <button id="copy-btn" class="absolute top-4 right-4 bg-black/50 hover:bg-rose-500/20 text-zinc-400 hover:text-white p-2 rounded-xl border border-white/5 transition-all outline-none">
                            <iconify-icon icon="lucide:copy" id="copy-icon" class="text-base"></iconify-icon>
                            <iconify-icon icon="lucide:check" id="check-icon" class="hidden text-base text-green-400"></iconify-icon>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 py-10 px-6">
        <p class="text-center text-zinc-600 text-[10px] font-bold uppercase tracking-[0.3em] opacity-60">
            Powered by T5 Transformer · Built with Flask · UI v1.0
        </p>
    </footer>

    <script>
        const textInput = document.getElementById('text-input');
        const charCount = document.getElementById('char-count');
        const wordCountStatus = document.getElementById('word-count');
        const summarizeBtn = document.getElementById('summarize-btn');
        const btnIdle = document.getElementById('btn-idle');
        const btnLoading = document.getElementById('btn-loading');
        const clearBtn = document.getElementById('clear-btn');
        const resultSection = document.getElementById('result-section');
        const summaryContent = document.getElementById('summary-content');
        const reductionStat = document.getElementById('reduction-stat');
        const copyBtn = document.getElementById('copy-btn');
        const toastRoot = document.getElementById('toast-root');

        const countWords = (str) => str.trim().split(/\s+/).filter(w => w).length;

        const showToast = (msg, type = 'success') => {
            const toast = document.createElement('div');
            toast.className = `toast-item flex items-center gap-3 px-6 py-4 rounded-xl border backdrop-blur-md shadow-2xl ${
                type === 'success' ? 'bg-green-500/10 border-green-500/20 text-green-400' : 'bg-rose-500/10 border-rose-500/20 text-rose-400'
            }`;
            const icon = type === 'success' ? 'lucide:check-circle' : 'lucide:alert-circle';
            toast.innerHTML = `<iconify-icon icon="${icon}" class="text-lg"></iconify-icon> <span class="text-xs font-bold uppercase tracking-widest">${msg}</span>`;
            toastRoot.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                toast.style.transition = '0.4s ease';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        };

        textInput.addEventListener('input', () => {
            const val = textInput.value;
            charCount.innerText = `${val.length} characters`;
            wordCountStatus.innerText = `${countWords(val)} words`;
        });

        clearBtn.addEventListener('click', () => {
            textInput.value = '';
            charCount.innerText = '0 characters';
            wordCountStatus.innerText = '0 words';
            resultSection.classList.add('hidden');
            textInput.focus();
        });

        summarizeBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text || text.length < 20) {
                textInput.classList.add('shake-element');
                showToast('Content too short or empty', 'error');
                setTimeout(() => textInput.classList.remove('shake-element'), 500);
                return;
            }

            summarizeBtn.disabled = true;
            btnIdle.classList.add('hidden');
            btnLoading.classList.remove('hidden');
            resultSection.classList.add('hidden');
            resultSection.style.opacity = '0';

            try {
                const startWords = countWords(text);
                const response = await fetch('/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();

                if (response.ok) {
                    summaryContent.innerText = data.summary;
                    const endWords = countWords(data.summary);
                    resultSection.classList.remove('hidden');
                    setTimeout(() => {
                        resultSection.style.opacity = '1';
                        reductionStat.innerText = `Reduced from ${startWords} words → ${endWords} words`;
                        reductionStat.classList.remove('hidden');
                    }, 50);
                    showToast('Intelligence Summarized!');
                } else {
                    const errorMsg = data.detail ? (Array.isArray(data.detail) ? data.detail[0].msg : data.detail) : 'System error';
                    showToast(errorMsg, 'error');
                }
            } catch (err) {
                showToast('Server connection failed', 'error');
            } finally {
                summarizeBtn.disabled = false;
                btnIdle.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });

        copyBtn.addEventListener('click', () => {
            const text = summaryContent.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const icon = document.getElementById('copy-icon');
                const check = document.getElementById('check-icon');
                icon.classList.add('hidden');
                check.classList.remove('hidden');
                showToast('Copied to clipboard');
                setTimeout(() => {
                    icon.classList.remove('hidden');
                    check.classList.add('hidden');
                }, 2000);
            });
        });
    </script>
</body>
</html>
